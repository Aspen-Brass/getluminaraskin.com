<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title> Downloads </title>
    </head>
    <body>
        <h1> Downloads </h1>
        <ul>
            <li><a id="https://getluminaraskin.com/" href="index.html"> Luminara Skin </a></li>
        </ul>
    
<script>
$(function(){
    /* ── Thumbnail clicks → change main image ── */
    $('.thum-sldr-inr, .prd-thumb').on('click', function(){
        var idx = $(this).closest('[data-slick-index]').data('slick-index');
        if(typeof idx === 'undefined') {
            idx = $(this).parent().children().index($(this).closest('.thum-sldr-inr, [data-slick-index]'));
        }
        /* Try slick goTo, fallback to manual */
        try {
            if($('.prd-sldr').hasClass('slick-initialized')) {
                $('.prd-sldr').slick('slickGoTo', idx);
                return;
            }
        } catch(e) {}
        /* Manual fallback: hide all slides, show clicked one */
        var slides = $('.prd-sldr .prd-sldr-inr, .prd-sldr [data-slick-index]:not(.slick-cloned)');
        if(slides.length) {
            slides.each(function(i){
                if(i === idx) {
                    $(this).show().css({opacity:1, position:'relative', left:0});
                } else {
                    $(this).hide();
                }
            });
        }
    });

    /* ── Package quantity selector ── */
    $(document).on('click', '.package_col', function(){
        var row = $(this).closest('.package_row');
        row.find('.package_col').removeClass('active');
        $(this).addClass('active');
        row.find('.pck-bx-rad').removeAttr('checked');
        $(this).find('.pck-bx-rad').attr('checked', 'checked');
    });

    /* ── Option toggle (subscription vs one-time) ── */
    $(document).on('click', '.option_row', function(){
        $('.option_row').removeClass('active');
        $(this).addClass('active');
        if($(this).hasClass('sub-opt')) {
            $('.otp-pkg').hide();
            $('.sub-pkg').fadeIn();
        } else {
            $('.sub-pkg').hide();
            $('.otp-pkg').fadeIn();
        }
    });
});
</script>
</body>
</html>
